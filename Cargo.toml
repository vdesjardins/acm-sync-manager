[package]
name = "acm-sync-manager"
version = "0.2.3"
edition = "2021"
default-run = "acm-sync-manager"
license = "Apache-2.0"
authors = ["Vincent Desjardins <vdesjardins@gmail.com>"]

[[bin]]
doc = false
name = "acm-sync-manager"
path = "src/main.rs"

[lib]
name = "acm_sync_manager"
path = "src/lib.rs"

[features]
default = []
telemetry = ["tonic", "opentelemetry-otlp"]

[dependencies]
futures = "0.3.31"
tokio = { version = "1.47.0", features = [
    "macros",
    "rt-multi-thread",
    "signal",
] }
tokio-rustls = "0.26.3"
k8s-openapi = { version = "0.26.0", features = [
    "v1_32",
], default-features = false }
actix-web = "4.11.0"
serde = { version = "1.0.226", features = ["derive"] }
serde_json = "1.0.145"
serde_yaml = "0.9.34"
chrono = { version = "0.4.42", features = ["serde"] }
thiserror = "2.0.16"
schemars = { version = "1.0.4", features = ["chrono04"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["json", "env-filter"] }
tracing-opentelemetry = "0.31.0"
opentelemetry = { version = "0.30.0", features = ["trace"] }
opentelemetry-otlp = { version = "0.30.0", features = [
    "tokio",
], optional = true }
opentelemetry_sdk = { version = "0.30.0", features = ["rt-tokio"] }
prometheus = "0.14.0"
tonic = { version = "0.14.2", features = ["transport"], optional = true }
aws-config = "1.8.6"
aws-sdk-acm = "1.87.0"
axum = { version = "0.8.4" }
tower-http = "0.6.6"
clap = { version = "4.5.48", features = ["derive"] }
anyhow = "1.0.100"
prometheus-client = "0.24.0"

[dependencies.kube]
features = ["runtime", "client", "derive", "rustls-tls", "aws-lc-rs"]

version = "2.0.1"
[dev-dependencies]
anyhow = "1.0.100"
